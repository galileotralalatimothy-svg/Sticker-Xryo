<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZryoX's Closet</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.4;
        }

        .header {
            padding-bottom: 15px;
            border-bottom: 1px solid #1f1f1f;
            margin-bottom: 25px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
            margin: 4px 0 0 0;
        }

        .user-section {
            margin-bottom: 25px;
        }

        .username {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 8px 0;
        }

        .stats {
            font-size: 13px;
            color: #555;
            margin-bottom: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            background-color: #1a1a1a;
            color: #efefef;
            border: 1px solid #2a2a2a;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .card {
            background-color: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1f1f1f;
            display: flex;
            flex-direction: column;
        }

        .image-container {
            aspect-ratio: 1/1;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-info {
            padding: 10px;
            background-color: #111;
        }

        .asset-id {
            font-family: monospace;
            font-size: 11px;
            color: #555;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .copy-btn {
            width: 100%;
            background-color: #1a1a1a;
            color: #999;
            border: 1px solid #222;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background-color: #222;
            color: #fff;
        }

        #status {
            text-align: center;
            color: #777;
            margin: 50px 0;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="header">
        <p class="title">ZryoX's Closet</p>
        <p class="subtitle">Sticker Gallery</p>
    </div>

    <div class="user-section" id="userSection" style="display:none;">
        <p class="username" id="username">Loading...</p>
        <p class="stats" id="stats">0 stickers · Loading...</p>
        
        <div class="button-group">
            <button class="btn" id="copyAllBtn">Copy All IDs</button>
            <button class="btn" id="rawBtn">RAW</button>
        </div>
    </div>

    <div id="status">Fetching stickers...</div>
    <div class="grid" id="grid"></div>

    <script>
    const grid = document.getElementById("grid");
    const status = document.getElementById("status");
    const userSection = document.getElementById("userSection");
    const usernameEl = document.getElementById("username");
    const statsEl = document.getElementById("stats");
    const copyAllBtn = document.getElementById("copyAllBtn");
    const rawBtn = document.getElementById("rawBtn");
    const urlParams = new URLSearchParams(window.location.search);
    const pasteID = urlParams.get("id");
    let currentIDs = [];

    async function load() {
        if (!pasteID) {
            status.innerText = "Walang ID sa URL. Halimbawa: ?id=pNxGRV6E";
            return;
        }

        const fallback = "https://tr.rbxcdn.com/c4265017c98559993061733b1125a23c/48/48/AvatarHeadshot/Png";

        try {
            const proxy = "https://corsproxy.io/?";
            const pasteApi = `https://api.pastefy.app/paste/${pasteID}`;
            const res = await fetch(proxy + encodeURIComponent(pasteApi));
            const data = await res.json();

            if (!data.paste || !data.paste.content) {
                throw new Error("Walang paste o content");
            }

            const content = data.paste.content;
            currentIDs = content.match(/\d{6,}/g) || [];

            if (currentIDs.length === 0) {
                status.innerText = "Walang valid sticker IDs sa paste.";
                return;
            }

            status.style.display = "none";
            userSection.style.display = "block";

            usernameEl.innerText = data.paste.title || "ZryoX's Stickers";

            const dateStr = new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) + " " + new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
            statsEl.innerText = `${currentIDs.length} stickers · ${dateStr}`;

            rawBtn.onclick = () => window.open(`https://pastefy.app/${pasteID}/raw`);

            copyAllBtn.onclick = () => {
                navigator.clipboard.writeText(currentIDs.join("\n"));
                copyAllBtn.innerText = "Copied!";
                setTimeout(() => copyAllBtn.innerText = "Copy All IDs", 1500);
            };

            grid.innerHTML = "";

            currentIDs.forEach(async (id) => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div class="image-container">
                        <img class="sticker-img" alt="${id}" src="${fallback}">
                    </div>
                    <div class="card-info">
                        <div class="asset-id">${id}</div>
                        <button class="copy-btn" onclick="copyText('${id}', this)">Copy ID</button>
                    </div>
                `;
                grid.appendChild(card);
                const img = card.querySelector("img");
                try {
                    const apiUrl = `https://thumbnails.roblox.com/v1/assets?assetIds=${id}&size=420x420&format=Png&isCircular=false`;
                    const thumbRes = await fetch(proxy + encodeURIComponent(apiUrl));
                    const thumbData = await thumbRes.json();
                    if (thumbData.data && thumbData.data[0] && thumbData.data[0].imageUrl) {
                        img.src = thumbData.data[0].imageUrl;
                    }
                } catch (e) {
                    console.log("Error", e);
                }
            });

        } catch (e) {
            status.innerText = "Error loading stickers. Check console.";
        }
    }

    function copyText(text, btn) {
        navigator.clipboard.writeText(text);
        const orig = btn.innerText;
        btn.innerText = "Copied!";
        setTimeout(() => btn.innerText = orig, 1500);
    }

    load();
</script>

</body>
</html>
