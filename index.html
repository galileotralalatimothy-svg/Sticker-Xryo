<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>ZryoX Sticker Gallery</title>
    <style>
        :root { --bg: #0c0c0c; --card-bg: #161616; --text: #fff; --text-sec: #888; --accent: #333; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        header { margin-bottom: 25px; }
        .title { font-size: 22px; font-weight: 700; }
        .subtitle { font-size: 14px; color: var(--text-sec); margin-bottom: 20px; }
        .player-info { margin-bottom: 15px; }
        .player-name { font-size: 18px; font-weight: 600; }
        .sticker-count { font-size: 13px; color: var(--text-sec); }
        .header-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .btn { background: var(--accent); color: #fff; border: none; padding: 10px 15px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 600px; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; }
        .img-container { width: 100%; aspect-ratio: 1/1; background: #000; display: flex; align-items: center; justify-content: center; padding: 10px; }
        .sticker-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-details { padding: 12px; }
        .sticker-id { font-size: 11px; color: var(--text-sec); margin-bottom: 8px; font-family: monospace; }
        .copy-btn { background: var(--accent); color: #fff; border: none; padding: 8px; border-radius: 5px; font-size: 11px; width: 100%; cursor: pointer; }
        #status { text-align: center; margin-top: 50px; color: var(--text-sec); }
    </style>
</head>
<body>
    <header>
        <div class="title">ZryoX's Gallery</div>
        <div class="subtitle">Sticker Gallery</div>
        <div id="ui-header" style="display:none">
            <div class="player-info">
                <div class="player-name" id="p-name">Loading...</div>
                <div class="sticker-count" id="p-count">0 stickers</div>
            </div>
            <div class="header-buttons">
                <button class="btn" id="copy-all">Copy All IDs</button>
                <button class="btn" id="raw-link">RAW</button>
            </div>
        </div>
    </header>
    <div id="status">Fetching stickers...</div>
    <div class="grid" id="grid"></div>

    <script>
        const grid = document.getElementById("grid");
        const status = document.getElementById("status");
        const uiHeader = document.getElementById("ui-header");
        const nameLabel = document.getElementById("p-name");
        const countLabel = document.getElementById("p-count");
        const urlParams = new URLSearchParams(window.location.search);
        const pasteID = urlParams.get("id");

        let currentIDs = [];

        async function load() {
            if (!pasteID) {
                status.innerText = "Walang ID sa URL. Halimbawa: ?id=ZjGxoLXk";
                return;
            }

            const fallback = "https://tr.rbxcdn.com/c4265017c98559993061733b1125a23c/48/48/AvatarHeadshot/Png";

            try {
                const res = await fetch(`https://api.pastefy.app/paste/${pasteID}`);
                const data = await res.json();

                if (!data.paste) throw new Error("Walang paste");

                const content = data.paste.content;
                currentIDs = content.match(/\d{6,}/g) || [];

                if (currentIDs.length === 0) {
                    status.innerText = "Walang valid sticker IDs sa paste.";
                    return;
                }

                status.style.display = "none";
                uiHeader.style.display = "block";

                nameLabel.innerText = data.paste.title || "Unknown Player";
                countLabel.innerText = `${currentIDs.length} stickers collected`;

                document.getElementById("raw-link").onclick = () => {
                    window.open(`https://pastefy.app/${pasteID}/raw`);
                };

                grid.innerHTML = "";

                currentIDs.forEach(async (id) => {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.innerHTML = `
                        <div class="img-container">
                            <img class="sticker-img" alt="\( {id}" src=" \){fallback}">
                        </div>
                        <div class="card-details">
                            <div class="sticker-id">${id}</div>
                            <button class="copy-btn" onclick="copyText('${id}', this)">Copy ID</button>
                        </div>
                    `;

                    grid.appendChild(card);

                    const img = card.querySelector("img");

                    try {
                        const proxy = "https://corsproxy.io/?";
                        const apiUrl = `https://thumbnails.roblox.com/v1/assets?assetIds=${id}&size=420x420&format=Png&isCircular=false`;
                        const thumbRes = await fetch(proxy + encodeURIComponent(apiUrl));
                        const thumbData = await thumbRes.json();

                        if (thumbData.data && thumbData.data[0] && thumbData.data[0].imageUrl) {
                            img.src = thumbData.data[0].imageUrl;
                        }
                    } catch (e) {
                        console.log("Thumbnail fetch failed for " + id, e);
                    }
                });

            } catch (e) {
                console.error(e);
                status.innerText = "Error loading stickers. Check console.";
            }
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text);
            const orig = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = orig, 1500);
        }

        document.getElementById("copy-all").onclick = function() {
            navigator.clipboard.writeText(currentIDs.join("\n"));
            this.innerText = "Copied All!";
            setTimeout(() => this.innerText = "Copy All IDs", 1500);
        };

        load();
    </script>
</body>
</html>
