<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZryoX's Closet</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.4;
        }

        .header {
            padding-bottom: 15px;
            border-bottom: 1px solid #1f1f1f;
            margin-bottom: 25px;
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
            margin: 4px 0 0 0;
        }

        .user-section {
            margin-bottom: 25px;
            display: none; /* Lalabas lang kapag may data na */
        }

        .username {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 8px 0;
        }

        .stats {
            font-size: 13px;
            color: #555;
            margin-bottom: 15px;
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            background-color: #1a1a1a;
            color: #efefef;
            border: 1px solid #2a2a2a;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .card {
            background-color: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #1f1f1f;
            display: flex;
            flex-direction: column;
        }

        .image-container {
            aspect-ratio: 1/1;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-info {
            padding: 10px;
            background-color: #111;
        }

        .asset-id {
            font-family: monospace;
            font-size: 11px;
            color: #555; /* Ginawa kong 555 para mas visible sa dark mode */
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .copy-btn {
            width: 100%;
            background-color: #1a1a1a;
            color: #999;
            border: 1px solid #222;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }

        .copy-btn:hover {
            background-color: #222;
            color: #fff;
        }

        #loading-text {
            text-align: center;
            color: #555;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="header">
        <p class="title">ZryoX's Closet</p>
        <p class="subtitle">Sticker Gallery</p>
    </div>

    <div id="loading-text">Fetching stickers...</div>

    <div class="user-section" id="user-info">
        <p class="username" id="user-title">ZryoX's Stickers</p>
        <p class="stats" id="user-stats">0 stickers · Loading...</p>
        
        <div class="button-group">
            <button class="btn" id="copy-all">Copy All IDs</button>
            <button class="btn" id="view-raw">RAW</button>
        </div>
    </div>

    <div class="grid" id="sticker-grid">
        </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pasteID = urlParams.get('id');
        const proxy = "https://corsproxy.io/?";

        async function init() {
            if (!pasteID) {
                document.getElementById('loading-text').innerText = "";
                return;
            }

            try {
                // Kunin ang data sa Pastefy
                const res = await fetch(proxy + encodeURIComponent(`https://api.pastefy.app/paste/${pasteID}`));
                const data = await res.json();
                
                const content = data.paste.content;
                const ids = content.match(/\d{6,}/g) || []; // Lahat ng numbers na sticker ID

                if (ids.length === 0) {
                    document.getElementById('loading-text').innerText = "No stickers found in this paste.";
                    return;
                }

                // Ipakita ang UI
                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('user-info').style.display = 'block';
                document.getElementById('user-title').innerText = data.paste.title || "ZryoX's Stickers";
                
                const dateNow = new Date().toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
                document.getElementById('user-stats').innerText = `${ids.length} stickers · ${dateNow}`;

                // Buttons setup
                document.getElementById('view-raw').onclick = () => window.open(`https://pastefy.app/${pasteID}/raw`);
                document.getElementById('copy-all').onclick = () => {
                    navigator.clipboard.writeText(ids.join('\n'));
                    alert('All IDs copied to clipboard!');
                };

                const grid = document.getElementById('sticker-grid');

                // I-loop ang IDs para gumawa ng cards
                ids.forEach(id => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // Gamitin ang Roblox Thumbnail API via Proxy para makuha ang CDN link
                    const thumbUrl = `https://thumbnails.roblox.com/v1/assets?assetIds=${id}&size=420x420&format=Png&isCircular=false`;
                    
                    card.innerHTML = `
                        <div class="image-container">
                            <img id="img-${id}" src="https://tr.rbxcdn.com/c4265017c98559993061733b1125a23c/48/48/AvatarHeadshot/Png" alt="Sticker">
                        </div>
                        <div class="card-info">
                            <div class="asset-id">${id}</div>
                            <button class="copy-btn" onclick="copyId('${id}', this)">Copy ID</button>
                        </div>
                    `;
                    grid.appendChild(card);

                    // I-update ang image kapag nakuha na ang totoong CDN link
                    fetch(proxy + encodeURIComponent(thumbUrl))
                        .then(r => r.json())
                        .then(d => {
                            if (d.data && d.data[0].imageUrl) {
                                document.getElementById(`img-${id}`).src = d.data[0].imageUrl;
                            }
                        });
                });

            } catch (err) {
                document.getElementById('loading-text').innerText = "Error loading stickers. Check Paste ID.";
            }
        }

        window.copyId = (id, btn) => {
            navigator.clipboard.writeText(id);
            const originalText = btn.innerText;
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = originalText, 1000);
        };

        init();
    </script>
</body>
</html>
