<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ZryoX Sticker Gallery</title><style>:root{--bg:#0c0c0c;--card:#161616;--gray:#333;--text:#fff;--dim:#888}body{background:var(--bg);color:var(--text);font-family:sans-serif;margin:0;padding:20px;text-align:center}header{margin-bottom:30px;border-bottom:1px solid var(--gray);padding-bottom:20px}.player-name{font-size:24px;font-weight:700;margin:0}.count{color:var(--dim);font-size:14px;margin-top:5px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;max-width:500px;margin:0 auto}.card{background:var(--card);border-radius:10px;padding:10px;border:1px solid var(--gray)}.img-box{width:100%;aspect-ratio:1/1;background:#000;border-radius:5px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}img{max-width:90%;max-height:90%;object-fit:contain}.id-label{font-size:11px;color:var(--dim);display:block;margin-bottom:8px;font-family:monospace}button{background:var(--gray);color:#fff;border:none;padding:8px;width:100%;border-radius:5px;cursor:pointer;font-size:11px}.status{padding:50px;color:var(--dim);font-style:italic}</style></head><body><header><div class="player-name" id="p-name">Sticker Gallery</div><div class="count" id="p-count">Loading stickers...</div></header><div class="grid" id="sticker-grid"></div><script>const grid=document.getElementById("sticker-grid"),nameLabel=document.getElementById("p-name"),countLabel=document.getElementById("p-count"),urlParams=new URLSearchParams(window.location.search),pasteID=urlParams.get("id");async function fetchStickers(){if(!pasteID)return grid.innerHTML='<div class="status">No ID provided. Check your Discord link.</div>',void(countLabel.innerText="0 stickers");try{const e=await fetch(`https://api.pastefy.app/paste/${pasteID}`),t=await e.json(),a=t.paste.content,n=a.match(/\d+/g)||[];if(0===n.length)return void(grid.innerHTML='<div class="status">No stickers found in this paste.</div>');nameLabel.innerText=t.paste.title||"Player Stickers",countLabel.innerText=`${n.length} stickers collected`,grid.innerHTML="",n.forEach(e=>{const t=document.createElement("div");t.className="card",t.innerHTML=`<div class="img-box"><img src="https://www.roblox.com/asset-thumbnail/image?assetId=${e}&width=420&height=420&format=png" onerror="this.src='https://tr.rbxcdn.com/180DAY-5a72278ef15969615cefcc684868d3af/420/420/Image/Png/noFilter'"></div><span class="id-label">${e}</span><button onclick="navigator.clipboard.writeText('${e}')">COPY</button>`,grid.appendChild(t)})}catch(e){grid.innerHTML='<div class="status">Error loading stickers. Invalid ID?</div>'}}fetchStickers();</script></body></html>
